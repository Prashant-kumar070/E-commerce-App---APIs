<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Login | SwiftMarket</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

                      "inverse-primary": "#b4c5ff",

              "fontFamily": {

<style>
        .glass-panel {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(226, 232, 240, 0.8);
        }
        .ambient-glow {
            background: radial-gradient(circle at 50% 50%, rgba(0, 75, 202, 0.05) 0%, rgba(248, 249, 255, 0) 70%);
        }
    </style>
</head>
<body class="bg-background text-on-background font-body-md min-h-screen flex items-center justify-center relative overflow-hidden">
<!-- Ambient Background Elements -->
<div class="absolute inset-0 ambient-glow pointer-events-none"></div>
<div class="absolute -top-24 -left-24 w-96 h-96 bg-primary-container/10 rounded-full blur-3xl opacity-50"></div>
<div class="absolute -bottom-24 -right-24 w-96 h-96 bg-secondary-container/10 rounded-full blur-3xl opacity-50"></div>
<main class="w-full max-w-[440px] px-lg relative z-10">
<!-- Brand Identity -->
<div class="text-center mb-xl">
<div class="inline-flex items-center justify-center mb-md">
<span class="material-symbols-outlined text-primary text-[48px]" data-icon="storefront" style="font-variation-settings: 'FILL' 1;">storefront</span>
</div>
<h1 class="font-h1 text-h1 text-primary tracking-tight">SwiftMarket</h1>
<p class="font-body-md text-on-surface-variant mt-xs">Access your unified commerce dashboard</p>
</div>
<!-- Login Card -->
<section class="glass-panel rounded-xl p-xl shadow-md">
<form action="#" class="space-y-lg" method="POST">
<!-- Social Login -->
<button class="w-full flex items-center justify-center gap-md bg-surface-container-lowest border border-outline-variant py-md px-lg rounded-lg font-label-md text-on-surface hover:bg-surface-container-low transition-all active:scale-[0.98]" type="button">
<img alt="Google" class="w-5 h-5" src="https://lh3.googleusercontent.com/aida-public/AB6AXuBDYowmiUxEk5kmXsYsPOEnq9LZuWV2uAHsWYEeI7y2ArXHhCXWPqLS7aP9u1hKsNlGQ6uTpUPTwnPjHjXhHSmvMmecHujKVwtbAN_KjuiaqTPHjXvxBXVvjxK4uhDld0bOklVUlTqoUAinNqMA2Pn0aNL7Mz7xHP1dhrZMuJS6dT_f-owVGCljNvORDstryeXPQP7wx7cxRiMoD4pp1fsmNTiRzxhgr_8jjHkvZzevGD7s4rWVvgyYy80ABFo_DnL9z-WVPBXsMr4"/>
                    Sign in with Google
                </button>
<div class="relative flex items-center py-sm">
<div class="flex-grow border-t border-outline-variant"></div>
<span class="flex-shrink mx-md font-label-sm text-on-surface-variant uppercase tracking-widest">or email</span>
<div class="flex-grow border-t border-outline-variant"></div>
</div>
<!-- Credentials -->
<div class="space-y-md">
<div class="flex flex-col gap-xs">
<label class="font-label-md text-on-surface-variant px-xs" for="email">Email Address</label>
<input class="w-full h-12 px-md rounded-lg border border-outline-variant bg-surface-container-lowest text-on-surface placeholder:text-outline focus:outline-none focus:ring-4 focus:ring-primary/10 focus:border-primary transition-all" id="email" name="email" placeholder="name@company.com" required="" type="email"/>
</div>
<div class="flex flex-col gap-xs">
<div class="flex justify-between items-center px-xs">
<label class="font-label-md text-on-surface-variant" for="password">Password</label>
<a class="font-label-sm text-primary hover:underline" href="#">Forgot Password?</a>
</div>
<input class="w-full h-12 px-md rounded-lg border border-outline-variant bg-surface-container-lowest text-on-surface placeholder:text-outline focus:outline-none focus:ring-4 focus:ring-primary/10 focus:border-primary transition-all" id="password" name="password" placeholder="••••••••" required="" type="password"/>
</div>
</div>
<!-- Submit -->
<button class="w-full h-12 bg-primary text-on-primary rounded-lg font-label-md font-bold shadow-lg hover:shadow-xl hover:bg-primary/90 transition-all active:scale-[0.98]" type="submit">
                    Login
                </button>
</form>
<!-- Footer Link -->
<div class="mt-xl text-center">
<p class="font-body-sm text-on-surface-variant">
                    Don't have an account? 
                    <a class="text-primary font-bold hover:underline ml-xs" href="#">Register</a>
</p>
</div>
</section>
<!-- Secondary Navigation/Legal -->
<footer class="mt-xl text-center space-x-md">
<a class="font-label-sm text-on-surface-variant hover:text-primary transition-colors" href="#">Privacy Policy</a>
<span class="text-outline-variant">•</span>
<a class="font-label-sm text-on-surface-variant hover:text-primary transition-colors" href="#">Terms of Service</a>
<span class="text-outline-variant">•</span>
<a class="font-label-sm text-on-surface-variant hover:text-primary transition-colors" href="#">Help Center</a>
</footer>
</main>
<!-- Decorative Illustration Segment -->
<div class="hidden lg:block absolute bottom-0 right-0 w-1/4 h-1/2 opacity-20 pointer-events-none">
<div class="w-full h-full" style="background-image: radial-gradient(circle at center, #004bca 1px, transparent 1px); background-size: 24px 24px;"></div>
</div>
</body></html>
